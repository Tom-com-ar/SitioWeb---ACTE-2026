<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
</head>

<body>
    <div class="container">
        <div class="row">
            <form class="col s12 m8 offset-m2 card-panel">

                <h5 class="center-align">Registro</h5>

                <!-- Nombre -->
                <div class="input-field col s12 m6">
                    <i class="material-icons prefix">person</i>
                    <input id="nombre" type="text" required>
                    <label for="nombre">Nombre</label>
                </div>

                <!-- Apellido -->
                <div class="input-field col s12 m6">
                    <input id="apellido" type="text" required>
                    <label for="apellido">Apellido</label>
                </div>

                <!-- Email -->
                <div class="input-field col s12">
                    <i class="material-icons prefix">email</i>
                    <input id="email_registro" type="email" required>
                    <label for="email_registro">Correo electrónico</label>
                </div>

                <!-- Contraseña -->
                <div class="input-field col s12 m6">
                    <i class="material-icons prefix">lock</i>
                    <input id="password" type="password" required>
                    <label for="password">Contraseña</label>
                </div>

                <!-- Confirmar contraseña -->
                <div class="input-field col s12 m6">
                    <input id="confirm_password" type="password" required>
                    <label for="confirm_password">Confirmar contraseña</label>
                </div>

                <!-- Botón -->
                <div class="col s12 center-align" style="margin-top:20px;">
                    <button class="btn green waves-effect waves-light" type="submit">
                        Registrarse
                    </button>
                </div>

            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="../js/main.js"></script>

</body>

</html>
