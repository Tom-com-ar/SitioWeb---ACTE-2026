<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
</head>

<body class="auth-page">
    <div class="auth-shell">
        <form action="../php/registro.php" method="POST" class="card-panel auth-card">

            <h5 class="center-align">Registro</h5>

            <div class="row auth-row">
                <div class="input-field col s12 m6">
                    <i class="material-icons prefix">person</i>
                    <input id="nombre" name="nombre" type="text" required>
                    <label for="nombre">Nombre</label>
                </div>

                <div class="input-field col s12 m6">
                    <input id="apellido" name="apellido" type="text" required>
                    <label for="apellido">Apellido</label>
                </div>
            </div>

            <div class="row auth-row">
                <div class="input-field col s12">
                        <i class="material-icons prefix">email</i>
                        <input id="email_registro" name="email" type="email" required>
                        <label for="email_registro">Correo electrónico</label>
                    </div>
            </div>

            <div class="row auth-row">
                <div class="input-field col s12 m6">
                    <i class="material-icons prefix">lock</i>
                    <input id="password" name="password" type="password" required>
                    <label for="password">Contraseña</label>
                </div>

                <div class="input-field col s12 m6">
                    <input id="confirm_password" type="password" required>
                    <label for="confirm_password">Confirmar contraseña</label>
                </div>
            </div>

            <div class="center-align auth-submit">
                <button class="btn green waves-effect waves-light" type="submit">
                    Registrarse
                </button>
            </div>

            <div class="auth-actions">
                <a href="../index.php" class="btn-flat waves-effect auth-link">
                    ← Volver al inicio
                </a>
                <a href="login.html" class="auth-link">
                    ¿Ya tenés cuenta? Iniciá sesión
                </a>
            </div>

        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="../js/main.js"></script>

</body>

</html>
