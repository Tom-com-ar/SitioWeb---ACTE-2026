<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>

<body>

    <div class="row" style="width:100%; max-width:400px;">
        <form action="../php/login.php" method="POST" class="col s12 card-panel">

            <h5 class="center-align">Iniciar Sesión</h5>

            <div class="input-field">
                <i class="material-icons prefix">email</i>
                <input id="email_login" name="email" type="email" required>
                <label for="email_login">Correo electrónico</label>
            </div>

            <div class="input-field">
                <i class="material-icons prefix">lock</i>
                <input id="password_login" name="password" type="password" required>
                <label for="password_login">Contraseña</label>
            </div>

            <div class="center-align">
                <button class="btn blue waves-effect waves-light" type="submit">
                    Ingresar
                </button>
            </div>

        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="../js/main.js"></script>

</body>

</html>
